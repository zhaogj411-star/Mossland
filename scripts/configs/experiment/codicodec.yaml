# @package _global_

project_name: codicodec
checkpoint_monitor: loss
tags: ["audioCodec", "codicodec"]
seed: null
resume_from_ckpt: null
pretrain_ckpt_path: null
checkpoint_every_n_train_steps: 2000

data:
  _target_: scripts.data.datasets.Experiment_Dataset
  dataset:
    _target_: scripts.data.datasets.SampleDataset
    dirs: ["/inspire/qb-ilm2/project/embodied-multimodality/public/zhaoguojie/data/NETEASE_SPIDER"]
    sample_size: 66560 # 64 STFT frames with hop=1024/window=2048: two 32-frame chunks
    sample_rate: 44100
    keywords: null
    random_crop: true
    num_channels: 2
    audio_cache_dir: null
    no_channel_dim: false
    crops_per_file: 16 # load one audio once, crop 16 segments, then flatten to the effective training batch
  pin_memory: true
  val_split: 0.0001
  train_batch_size: 1
  val_batch_size: 1
  num_workers: 10

model:
  _target_: scripts.codicodec.models.UNet

wrapper:
  _target_: scripts.codicodec.wrapper.CoDiCodecTrainingWrapper
  use_ema: true
  ema_beta: 0.9999
  learning_rate: 1e-4
  weight_decay: 0.0
  optimizer_name: radam
  lr_schedule: cosine_decay
  lr_warmup_steps: 10000
  lr_schedule_total_steps: 2000000
  random_mix_prob: 0.5
  fsq_dropout_prob: 0.75
  consistency_step: 0.1
  consistency_step_schedule: exponential
  consistency_step_total_steps: 2000000
  consistency_step_end_exp: 2.0
  sigma_sampling: lognormal
  lognormal_mean: -1.1
  lognormal_std: 2.0
  consistency_loss_delta: 0.00054
  consistency_min_sigma_delta: 0.001
  fail_on_nonfinite: true

callbacks:
  demo_callback:
    _target_: scripts.codicodec.wrapper.CoDiCodecTrainingCallback
    demo_dir: ${paths.output_dir}/demos
    demo_num: 2
    demo_every: 1000
    sample_rate: 44100
    use_ema: true
    silence_seconds: 0.25
