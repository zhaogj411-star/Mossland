defaults:
  - model_checkpoint
  - model_summary
  # - rich_progress_bar
  - _self_

model_checkpoint:
  dirpath: ${paths.output_dir}/checkpoints
  monitor: ${checkpoint_monitor}
  mode: "min"
  save_last: True
  auto_insert_metric_name: False
  every_n_train_steps: ${checkpoint_every_n_train_steps}

model_summary:
  max_depth: 1
